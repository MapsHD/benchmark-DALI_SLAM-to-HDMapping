common:
    # Livox sensor whose scans were exported as sensor_msgs/PointCloud2
    # (fields: x, y, z, intensity, tag, line, time[s]) instead of the native
    # livox_ros_driver/CustomMsg. Used e.g. by the Bunker DVI dataset
    # (/livox/pointcloud + /livox/imu).
    lid_topic:  "/livox/pointcloud"
    imu_topic:  "/livox/imu"
    time_sync_en: false
    time_offset_lidar_to_imu: 0.0

preprocess:
    # lidar_type 2 (VELODYNE handler) is reused on purpose: with the per-point
    # "time" field populated (>0) and feature extraction disabled, the handler
    # uses only x/y/z/intensity/time and ignores "ring", which is exactly the
    # Livox PointCloud2 layout.
    lidar_type: 2
    scan_line: 6
    scan_rate: 10
    timestamp_unit: 0            # Livox PointCloud2 per-point time is in SECONDS
    blind: 0.5

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    degeneracy: 4.48            # sqrt(20); DALI degeneracy threshold
    fov_degree:    180
    det_range:     100.0
    extrinsic_est_en:  false
    # Livox internal IMU -> LiDAR extrinsic (Livox factory value).
    # Adjust if your sensor reports a different calibration.
    extrinsic_T: [ 0.04165, 0.02326, -0.0284 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1]

publish:
    path_en:  true
    scan_publish_en:  true
    dense_publish_en: true
    scan_bodyframe_pub_en: false

pcd_save:
    pcd_save_en: false
    interval: -1
